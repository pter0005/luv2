
[functions]
  node_bundler = "esbuild"

[build]
  command = "npm run build"
  publish = ".next"

# Secrets scanning — Netlify acha que NEXT_PUBLIC_FIREBASE_API_KEY ('AIzaSy…')
# é secret. Não é (Firebase Web API key é pública por design — Auth Rules
# protegem). E webpack cache em .netlify/.next/cache também escaneia, gera
# falso-positivo.
#
# Por que aqui no toml e não em env vars:
#   - AWS Lambda tem limite HARD de 4KB pra TODAS env vars somadas.
#   - Essas 3 são só pra build/scan, não precisam estar no runtime do Lambda.
#   - Setadas aqui, o scanner pega mas NÃO contam no Lambda env limit.
[build.environment]
  SECRETS_SCAN_OMIT_PATHS = ".netlify/.next/cache/**,.netlify/.next/static/**,.netlify/.next/standalone/**,.netlify/.next/server/**,.netlify/functions-internal/**"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "true"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_DATABASE_URL,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_PAYPAL_CLIENT_ID,NEXT_PUBLIC_MERCADO_PAGO_PUBLIC_KEY"

[functions."api/cron/cleanup-expired"]
  schedule = "0 4 * * *"

[functions."api/cron/daily-report"]
  schedule = "59 23 * * *"

[functions."api/cron/conversion-monitor"]
  schedule = "0 * * * *"

# Self-heal de imagens: a cada 30min varre páginas recentes (72h) procurando
# arquivos ainda em temp/ e tenta mover pro storage final. Recuperação
# automática sem intervenção manual — cliente geralmente nem nota a falha.
[functions."api/cron/self-heal-images"]
  schedule = "*/30 * * * *"

# Recover PIX stuck: 1×/hora pergunta ao Mercado Pago se intents pendentes
# (>1h, <24h) foram pagos. Se sim, finaliza a página automaticamente. Cobre o
# gap onde o webhook do MP morreu (timeout, retry esgotado, lentidão). Sem
# isso, cliente paga e nunca recebe → Reclame Aqui + reembolso.
[functions."api/cron/recover-stuck-pix"]
  schedule = "0 * * * *"
