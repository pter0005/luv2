
[functions]
  node_bundler = "esbuild"

[build]
  command = "npm run build"
  publish = ".next"

# Secrets scanning — Netlify acha que NEXT_PUBLIC_FIREBASE_API_KEY ('AIzaSy…')
# é secret. Não é (Firebase Web API key é pública por design — Auth Rules
# protegem). E webpack cache em .netlify/.next/cache também escaneia, gera
# falso-positivo. SECRETS_SCAN_OMIT_PATHS exclui dirs do scan.
[build.environment]
  SECRETS_SCAN_OMIT_PATHS = ".netlify/.next/cache/**,.netlify/.next/static/**,.netlify/.next/standalone/**,.netlify/.next/server/**,.netlify/functions-internal/**"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "true"

[functions."api/cron/cleanup-expired"]
  schedule = "0 4 * * *"

[functions."api/cron/daily-report"]
  schedule = "59 23 * * *"

[functions."api/cron/conversion-monitor"]
  schedule = "0 * * * *"

# Self-heal de imagens: a cada 30min varre páginas recentes (72h) procurando
# arquivos ainda em temp/ e tenta mover pro storage final. Recuperação
# automática sem intervenção manual — cliente geralmente nem nota a falha.
[functions."api/cron/self-heal-images"]
  schedule = "*/30 * * * *"
