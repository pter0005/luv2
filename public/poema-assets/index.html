<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Poema das Flores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Great+Vibes&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#0a0510;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none;font-family:'Playfair Display',serif;-webkit-tap-highlight-color:transparent}
  #app{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 45%,#1a0a22 0%,#0a0510 55%,#050008 100%)}
  #stageWrap{position:relative;aspect-ratio:375/812;max-width:100vw;max-height:100vh;width:auto;height:100vh;transform-origin:center;box-shadow:0 0 120px rgba(120,40,180,.25);border-radius:4px;overflow:hidden}
  #stage{position:absolute;inset:0;width:100%;height:100%;display:block}
  /* ── Scene text (non-finale) ── */
  #textOverlay{
    position:absolute;left:3.5%;right:3.5%;top:4.8%;text-align:center;
    font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;
    /* Bumped floor/vw/cap for easier legibility — measured 140px slack to the
       flower top at 375×812, so this ~17-20% growth still leaves ~90px gap. */
    color:#fff;font-size:clamp(42px,11vw,68px);line-height:1.14;letter-spacing:.006em;
    pointer-events:none;
    /* Slightly stronger single-layer glow — reads as halo, doesn't fog the text */
    text-shadow:0 0 12px rgba(200,150,230,.45);
    opacity:1;z-index:5;
    will-change:transform,opacity;
  }
  #textOverlay .word{
    display:inline-block;opacity:0;transform:translateY(-20px);
    transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1);
    margin:0 .14em;
    will-change:transform,opacity;
  }
  #textOverlay .word.in{opacity:1;transform:translateY(0)}
  #textOverlay.out .word{opacity:0!important;transform:translateY(18px)!important;transition:opacity .5s ease,transform .5s ease}

  /* Emphasis: the adjective (linda/doce/rara/única/especial)
     Per-scene flower-matched gradients + complementary glow applied below. */
  #textOverlay .word.em{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;
    font-size:1.3em;letter-spacing:.01em;
    -webkit-background-clip:text;background-clip:text;
    color:transparent;-webkit-text-fill-color:transparent;
    padding:0 .04em;
  }
  /* Each emphasized adjective is colored to MATCH the scene's flower —
     "linda" wears the rose's gradient, "doce" the jasmin's, etc.
     NOTE: `background:` shorthand resets background-clip → must re-declare
     -webkit-background-clip:text here or the word renders as a solid rect. */
  #textOverlay .word.em.f-rosa{
    background:linear-gradient(178deg,#fff0f3 0%,#ff9ab0 24%,#ff3a5f 58%,#c60036 100%);
    -webkit-background-clip:text;background-clip:text;
    filter:drop-shadow(0 0 7px rgba(180,100,220,.42));
  }
  #textOverlay .word.em.f-jasmim{
    background:linear-gradient(178deg,#fffef6 0%,#fff3d0 26%,#ffe089 58%,#ffb63a 100%);
    -webkit-background-clip:text;background-clip:text;
    filter:drop-shadow(0 0 7px rgba(220,130,200,.42));
  }
  #textOverlay .word.em.f-violeta{
    background:linear-gradient(178deg,#f7e7ff 0%,#d8a6ff 26%,#9a4ff0 58%,#4a1090 100%);
    -webkit-background-clip:text;background-clip:text;
    filter:drop-shadow(0 0 7px rgba(255,170,100,.42));
  }
  #textOverlay .word.em.f-girassol{
    background:linear-gradient(178deg,#fffadb 0%,#ffe558 24%,#ffb828 58%,#e06200 100%);
    -webkit-background-clip:text;background-clip:text;
    filter:drop-shadow(0 0 7px rgba(170,120,240,.42));
  }
  #textOverlay .word.em.f-orquidea{
    background:linear-gradient(178deg,#ffe4f2 0%,#ff9ccf 26%,#e84ca3 58%,#7a1250 100%);
    -webkit-background-clip:text;background-clip:text;
    filter:drop-shadow(0 0 7px rgba(120,210,220,.42));
  }

  /* Hero flower name — huge cursive, color matches the flower being shown */
  #textOverlay .word.flower{
    display:block;
    font-family:'Great Vibes',cursive;font-style:normal;font-weight:400;
    font-size:2.78em;line-height:.95;letter-spacing:.005em;
    -webkit-background-clip:text;background-clip:text;
    color:transparent;-webkit-text-fill-color:transparent;
    padding:.02em .08em .08em;margin-top:.05em;
    transform:translateY(-20px);
    transition:opacity .9s cubic-bezier(.22,1,.36,1),transform .9s cubic-bezier(.22,1,.36,1);
    will-change:transform,opacity,filter;
  }
  #textOverlay .word.flower.in{transform:translateY(0)}

  /* Per-flower color treatments
     Each hero word has a gradient in its own color and a SUBTLE static glow
     in a COMPLEMENTARY hue — never the same color as the text, so you get
     a delicate aura instead of a white ghost halo. No animated pulses. */
  #textOverlay .word.flower.f-rosa{
    background:linear-gradient(178deg,#ffe4ea 0%,#ff8fa8 22%,#ff2550 52%,#c2002a 100%);
    -webkit-background-clip:text;background-clip:text;
    /* rose → soft violet halo */
    filter:drop-shadow(0 0 9px rgba(180,100,220,.42));
  }
  #textOverlay .word.flower.f-jasmim{
    background:linear-gradient(178deg,#fffdf0 0%,#fff1c8 25%,#ffdf80 58%,#ffae30 100%);
    -webkit-background-clip:text;background-clip:text;
    /* cream/gold → soft pink halo */
    filter:drop-shadow(0 0 9px rgba(220,130,200,.42));
  }
  #textOverlay .word.flower.f-violeta{
    background:linear-gradient(178deg,#f4e1ff 0%,#d098ff 25%,#8a3dea 58%,#3e0b80 100%);
    -webkit-background-clip:text;background-clip:text;
    /* purple → soft warm amber halo */
    filter:drop-shadow(0 0 9px rgba(255,170,100,.42));
  }
  #textOverlay .word.flower.f-girassol{
    background:linear-gradient(178deg,#fff9cc 0%,#ffe24a 24%,#ffb020 58%,#d65a00 100%);
    -webkit-background-clip:text;background-clip:text;
    /* yellow/orange → soft lavender halo */
    filter:drop-shadow(0 0 9px rgba(170,120,240,.42));
  }
  #textOverlay .word.flower.f-orquidea{
    background:linear-gradient(178deg,#ffdcee 0%,#ff8fc8 26%,#e13a9a 58%,#6e0a48 100%);
    -webkit-background-clip:text;background-clip:text;
    /* magenta → soft teal-green halo */
    filter:drop-shadow(0 0 9px rgba(120,210,220,.42));
  }

  /* ── Finale text composition ── */
  #textOverlay.finale{
    /* Nearly full width so the huge cursive "presente" has room for its tail
       swirls — the 4% margins were clipping the final "e". */
    left:1%;right:1%;top:2.8%;
    font-family:'Playfair Display',serif;font-style:italic;font-weight:500;
    color:#fff;text-align:center;letter-spacing:0;line-height:1;
    text-shadow:none;mix-blend-mode:normal;
    display:flex;flex-direction:column;align-items:center;gap:0;
  }
  #textOverlay.finale .fLine{display:block;line-height:1;width:100%}
  #textOverlay.finale .orn{
    font-family:'Playfair Display',serif;font-style:normal;font-weight:400;
    font-size:clamp(16px,4vw,24px);
    color:rgba(255,220,180,.78);letter-spacing:.8em;padding-left:.8em;
    margin:.1em 0 .3em;
    text-shadow:0 0 8px rgba(200,150,230,.32);
  }
  #textOverlay.finale .ornBot{margin:.3em 0 .05em}
  #textOverlay.finale .fIntro{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;
    /* Bumped +14% for legibility — 74px slack above bouquet; safe */
    font-size:clamp(32px,8vw,46px);letter-spacing:.025em;
    color:#fff;opacity:.94;
    /* Slightly stronger lavender glow */
    text-shadow:0 0 11px rgba(180,130,220,.42);
    margin-bottom:.12em;
  }
  #textOverlay.finale .fMid{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;
    /* +15% — at 375×812 the 5-word line "que a vida me deu" fits without wrap */
    font-size:clamp(38px,9.2vw,52px);letter-spacing:.018em;
    color:#fff;
    text-shadow:0 0 12px rgba(180,130,220,.45);
    margin:.08em 0;
  }
  #textOverlay.finale .fHero{
    font-family:'Great Vibes',cursive;font-style:normal;font-weight:400;
    /* Floor +9% (92→100). Padding stays .14em so 'p' and final 'e' tails
       keep their breathing room — verified ink overflow stays within slack. */
    font-size:clamp(100px,24.5vw,156px);line-height:.86;letter-spacing:.002em;
    margin:.03em 0 .08em;padding:0 .14em;
    /* Gold-gradient word, subtle magenta halo — complementary not same-color */
    filter:drop-shadow(0 0 12px rgba(210,110,200,.5));
  }
  #textOverlay.finale .fHero .word{
    background:linear-gradient(178deg,#fff6df 0%,#ffe6a8 22%,#ffc25c 48%,#ff9dd4 78%,#ffc6e8 100%);
    -webkit-background-clip:text;background-clip:text;
    color:transparent;-webkit-text-fill-color:transparent;
    padding:0 .08em;
  }
  #textOverlay.finale .fOutro{
    font-family:'Pinyon Script',cursive;font-style:normal;font-weight:400;
    font-size:clamp(36px,8.8vw,54px);line-height:1.05;letter-spacing:.01em;
    color:#fff;
    /* White script → soft warm amber glow */
    text-shadow:0 0 10px rgba(255,170,110,.38);
    margin-top:.08em;
  }
  /* Fade-in from the side for the entire finale container */
  #textOverlay.finale .word,
  #textOverlay.finale .orn,
  #textOverlay.finale .fLine{
    display:inline-block;
  }
  #textOverlay.finale .fLine{display:block}
  #textOverlay.finale .orn.word,
  #textOverlay.finale .fHero .word{margin:0}

  /* ── Narrow-viewport scaleback ──
     On iPhone SE (320) and older Androids (360), the bumped sizes cause
     "Tão especial" to wrap + "que a vida me deu" to wrap + "presente" ink
     to clip 2px on the left AND the whole finale text block overlaps the
     bouquet (because stage is letterboxed to 262×568 while vw still uses
     320). This block scales everything back + tightens margins + shifts
     the finale overlay up so the text bottom clears the topmost flower.
     Only applies to viewports < 375px wide — modern iPhones (375+) and
     all tablets stay at the larger, more legible sizes. */
  @media (max-width: 374px) {
    /* Shift scene overlay up so rosa's 4-row wrap doesn't touch the flower */
    #textOverlay{
      top:2.4%;
      font-size:clamp(31px,9.6vw,34px);
    }
    #textOverlay .word{ margin:0 .08em; }
    /* Reduce em multiplier so "Você é tão linda" stays on one row at 320 */
    #textOverlay .word.em{ font-size:1.16em;letter-spacing:.008em; }
    /* Finale: shift up + shrink to clear the bouquet top and prevent wraps */
    #textOverlay.finale{ top:.3%; }
    #textOverlay.finale .orn{
      font-size:clamp(12px,3.4vw,16px);
      margin:.02em 0 .12em;
    }
    #textOverlay.finale .ornBot{margin:.12em 0 .02em}
    #textOverlay.finale .fIntro{
      font-size:clamp(25px,7.8vw,28px);
      margin-bottom:.06em;
    }
    #textOverlay.finale .fMid{
      font-size:clamp(27px,8.4vw,30px);letter-spacing:.01em;
      margin:.04em 0;
    }
    /* Tighten per-word margins in the 5-word fMid line so "que a vida me deu"
       stays on one row at 320px. */
    #textOverlay.finale .fMid .word{ margin:0 .06em; }
    #textOverlay.finale .fHero{
      font-size:clamp(82px,25vw,92px);
      padding:0 .12em;
      margin:.02em 0 .04em;
    }
  }

  /* ── Liquid glass start button ── */
  #startBtn{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    padding:20px 46px 22px;white-space:nowrap;
    background:
      radial-gradient(ellipse at 50% 0%,rgba(255,255,255,.30) 0%,rgba(255,255,255,0) 55%),
      linear-gradient(180deg,rgba(255,170,210,.22) 0%,rgba(190,110,200,.16) 45%,rgba(120,60,170,.18) 100%);
    border:1px solid rgba(255,255,255,.42);
    color:#fff;
    font-family:'Playfair Display',serif;font-style:italic;font-weight:500;
    font-size:22px;letter-spacing:.02em;
    border-radius:999px;cursor:pointer;
    -webkit-backdrop-filter:blur(22px) saturate(165%);
    backdrop-filter:blur(22px) saturate(165%);
    box-shadow:
      0 1px 0 rgba(255,255,255,.55) inset,
      0 -1px 0 rgba(255,255,255,.12) inset,
      0 0 0 1px rgba(255,255,255,.08) inset,
      0 14px 44px rgba(180,60,160,.42),
      0 0 70px rgba(255,130,200,.35),
      0 0 160px rgba(200,100,220,.22);
    text-shadow:0 1px 2px rgba(60,10,80,.55),0 0 18px rgba(255,200,230,.45);
    transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s ease,opacity .6s ease;
    z-index:10;overflow:hidden;isolation:isolate;
  }
  /* Specular highlight sweep inside the glass */
  #startBtn::before{
    content:"";position:absolute;inset:0;border-radius:999px;pointer-events:none;
    background:linear-gradient(115deg,transparent 20%,rgba(255,255,255,.45) 40%,rgba(255,255,255,.12) 52%,transparent 65%);
    mix-blend-mode:screen;opacity:.85;
    animation:glassSweep 5.5s ease-in-out infinite;
  }
  /* Subtle inner bottom glow */
  #startBtn::after{
    content:"";position:absolute;left:8%;right:8%;bottom:0;height:40%;border-radius:50%;
    background:radial-gradient(ellipse at 50% 100%,rgba(255,120,200,.45) 0%,rgba(255,120,200,0) 70%);
    pointer-events:none;filter:blur(6px);opacity:.85;
  }
  @keyframes glassSweep{
    0%,100%{transform:translateX(-20%)}
    50%{transform:translateX(20%)}
  }
  #startBtn:hover,#startBtn:focus{
    transform:translate(-50%,-50%) scale(1.045);
    box-shadow:
      0 1px 0 rgba(255,255,255,.65) inset,
      0 -1px 0 rgba(255,255,255,.14) inset,
      0 0 0 1px rgba(255,255,255,.12) inset,
      0 18px 58px rgba(200,60,180,.55),
      0 0 90px rgba(255,140,210,.5),
      0 0 200px rgba(210,110,230,.3);
    outline:none;
  }
  #startBtn:active{transform:translate(-50%,-50%) scale(.98)}
  #startBtn .heart{display:inline-block;margin-left:.42em;color:#ffc6df;text-shadow:0 0 12px rgba(255,180,220,.9)}
  #startBtn.hidden{opacity:0;pointer-events:none;transform:translate(-50%,-50%) scale(.88)}
  #genderBtn{position:fixed;top:18px;right:18px;width:44px;height:44px;background:linear-gradient(180deg,rgba(255,255,255,.22) 0%,rgba(190,120,210,.14) 100%);border:1px solid rgba(255,255,255,.38);color:#fff;border-radius:50%;font-size:20px;cursor:pointer;z-index:20;-webkit-backdrop-filter:blur(18px) saturate(160%);backdrop-filter:blur(18px) saturate(160%);display:flex;align-items:center;justify-content:center;padding:0;transition:opacity .4s ease,transform .2s ease,box-shadow .3s ease;box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 6px 22px rgba(170,50,160,.3),0 0 30px rgba(255,140,210,.18);text-shadow:0 1px 2px rgba(60,10,80,.5)}
  /* Hide the gender toggle once the animation starts at EVERY viewport:
     the bumped scene text ("linda", "doce", "rara", etc.) with em 1.3x
     reaches into the top-right 44px corner where the fixed button sits
     — both at 375 and 320. Gender toggle is a pre-start UX anyway; once
     you've hit start the voice is locked. :has() is supported in every
     modern mobile browser (iOS Safari 15.4+, Chrome 105+, FF 121+). */
  body:has(#startBtn.hidden) #genderBtn{opacity:0;pointer-events:none}
  #genderBtn:hover{transform:scale(1.08);box-shadow:0 1px 0 rgba(255,255,255,.6) inset,0 8px 28px rgba(200,60,180,.4),0 0 44px rgba(255,140,210,.3)}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.55);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;z-index:100;background:#0a0510;transition:opacity .6s ease;pointer-events:none}
  #loading.hidden{opacity:0}
  #loading::after{content:"";display:inline-block;width:14px;height:14px;margin-left:10px;border:2px solid rgba(255,255,255,.2);border-top-color:#ff80c0;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #replayBtn{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);padding:11px 26px;background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,rgba(180,110,200,.14) 100%);border:1px solid rgba(255,255,255,.35);color:#fff;font-family:'Playfair Display',serif;font-style:italic;font-weight:500;font-size:15px;letter-spacing:.03em;border-radius:999px;cursor:pointer;z-index:15;opacity:0;pointer-events:none;transition:opacity .6s ease,transform .25s ease,box-shadow .3s ease;-webkit-backdrop-filter:blur(18px) saturate(160%);backdrop-filter:blur(18px) saturate(160%);box-shadow:0 1px 0 rgba(255,255,255,.45) inset,0 8px 28px rgba(170,50,160,.3),0 0 38px rgba(255,140,210,.18);text-shadow:0 1px 2px rgba(60,10,80,.5)}
  #replayBtn.shown{opacity:.9;pointer-events:auto}
  #replayBtn:hover{opacity:1;transform:translateX(-50%) scale(1.04);box-shadow:0 1px 0 rgba(255,255,255,.55) inset,0 10px 36px rgba(180,60,170,.4),0 0 60px rgba(255,140,210,.28)}
  @media (prefers-reduced-motion:reduce){
    #textOverlay .word{transition:opacity .4s ease;transform:none!important}
    #startBtn{transition:opacity .4s ease}
  }
  /* No mobile @media overrides needed — every glow in the base stylesheet
     is now a single-layer sub-12px drop-shadow/text-shadow, which composites
     fine on even low-end mobile GPUs. */
</style>
</head>
<body>
<div id="app">
  <div id="stageWrap">
    <canvas id="stage"></canvas>
    <div id="textOverlay"></div>
    <button id="startBtn">revelar a surpresa<span class="heart">&#10084;</span></button>
  </div>
</div>
<button id="genderBtn" aria-label="trocar versão">&#9792;</button>
<button id="replayBtn">repetir &#9825;</button>
<div id="loading">carregando</div>

<script>
(function(){
'use strict';

// ═══ SECTION 1: LOAD DATA ═══
const FLOWER_DATA = JSON.parse(document.getElementById('flower-data').textContent);
const STAGE_W = FLOWER_DATA.canvas.width;
const STAGE_H = FLOWER_DATA.canvas.height;

// Layer index → TRUE content mapping (verified by visual inspection):
// 0: SACOLA MUIÉ (bag wrap)     → finale primary (slides up from below)
// 1: "2" (white berry filler)   → finale secondary (fades in)
// 2: "2" (white berry filler)   → finale secondary (fades in)
// 3: orquidea (pink orchids)    → scene 5 primary
// 4: "é - Copia (2)" (RED ROSE) → scene 1 primary
// 5: VIOLETA (purple daisies)   → scene 3 primary
// 6: Jasmim (white jasmin)      → scene 2 primary
// 7: GIRASSOL (sunflower)       → scene 4 primary

// NOTE: LAYOUT TRANSFORM is now applied inside loadImages() AFTER bbox
// computation so we can use alpha-trimmed visible bounds for exact centering.
// That preserves the user's relative composition — no per-layer SAFETY_SHIFTS
// needed. See applyLayout() below.

// Text markup syntax:
//   {word}   → emphasized adjective (italic gold gradient, slightly bigger)
//   [word]   → flower name hero (cursive gold gradient, biggest)
const SCENES = [
  { id:'rosa',     primary:4, others:[],     duration:3800,
    primaryBehavior:'hero', othersBehavior:'fadeLate',
    fem:'Você é tão {linda}\nquanto uma [rosa]',
    mas:'Você é tão {lindo}\nquanto uma [rosa]' },
  { id:'jasmim',   primary:6, others:[],     duration:3700,
    primaryBehavior:'hero', othersBehavior:'fadeLate',
    fem:'Tão {doce}\nquanto um [jasmim]',
    mas:'Tão {doce}\nquanto um [jasmim]' },
  { id:'violeta',  primary:5, others:[],     duration:3700,
    primaryBehavior:'hero', othersBehavior:'fadeLate',
    fem:'Tão {rara}\nquanto a [violeta]',
    mas:'Tão {raro}\nquanto a [violeta]' },
  { id:'girassol', primary:7, others:[],     duration:3700,
    primaryBehavior:'hero', othersBehavior:'fadeLate',
    fem:'Tão {única}\nquanto o [girassol]',
    mas:'Tão {único}\nquanto o [girassol]' },
  { id:'orquidea', primary:3, others:[],     duration:3700,
    primaryBehavior:'hero', othersBehavior:'fadeLate',
    fem:'Tão {especial}\nquanto a [orquídea]',
    mas:'Tão {especial}\nquanto a [orquídea]' },
  { id:'finale',   primary:0, others:[1, 2], duration:7500,
    primaryBehavior:'fromBelow', othersBehavior:'fadeLate',
    fem:'você é o presente\nmais lindo que\na vida me deu.',
    mas:'você é o presente\nmais lindo que\na vida me deu.' },
];
const TOTAL_DURATION = SCENES.reduce((s,sc)=>s+sc.duration,0);

// ═══ SECTION 2: STATE ═══
let gender = localStorage.getItem('poema-gender') || 'fem';
let images = [];
let started = false;
let startTime = 0;
let lastFrame = 0;
let currentSceneIdx = -1;
let textVisible = false;
let animationDone = false;

// ═══ SECTION 3: UTILS ═══
const lerp = (a,b,t) => a + (b-a)*t;
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const easeInCubic  = t => t*t*t;
const easeInOutCubic = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
const easeOutBack = t => {
  const c1 = 1.6, c3 = c1 + 1;
  return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2);
};
const easeOutQuart = t => 1 - Math.pow(1-t, 4);

// Schedule next frame — uses RAF when visible, setTimeout fallback when hidden
// (RAF is throttled in hidden/background tabs, which breaks the animation)
function scheduleFrame(fn) {
  if (document.hidden || document.visibilityState === 'hidden') {
    setTimeout(() => fn(performance.now()), 16);
  } else {
    requestAnimationFrame(fn);
  }
}

// ═══ SECTION 4: CANVAS ═══
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d', { alpha: true });
let effectiveDPR = 1;

// Mobile heuristic — used to scale quality knobs down so celular runs liso
const IS_MOBILE = (window.matchMedia && window.matchMedia('(hover: none) and (pointer: coarse)').matches) || (window.innerWidth < 640);
const DPR_CAP = IS_MOBILE ? 2 : 3;
// Quality knobs tuned per device class — mobile runs noticeably lighter on
// background complexity, particle counts and grain repaint cadence.
const GRAIN_TICK_MOD = IS_MOBILE ? 4 : 3;
const ORB_COUNT     = IS_MOBILE ? 6 : 9;
const STAR_COUNT    = IS_MOBILE ? 50 : 75;
const MAX_PETALS    = IS_MOBILE ? 10 : 14;
const FLOURISH_MAX  = IS_MOBILE ? 5 : 7;

function resizeCanvas() {
  const wrap = document.getElementById('stageWrap');
  const rect = wrap.getBoundingClientRect();
  effectiveDPR = clamp((window.devicePixelRatio || 1) * (rect.width / STAGE_W), 1, DPR_CAP);
  canvas.width = Math.round(STAGE_W * effectiveDPR);
  canvas.height = Math.round(STAGE_H * effectiveDPR);
  ctx.setTransform(effectiveDPR, 0, 0, effectiveDPR, 0, 0);
}

// ═══ SECTION 5: LOAD IMAGES + COMPUTE BOUNDING BOXES ═══
// After loading, compute the non-transparent bounding box for each layer's image.
// This lets us center the VISIBLE content (not the full canvas rect) during hero reveal.
// Bounds are stored on the layer itself in normalized coords (0..1 of layer.w / layer.h).
async function loadImages() {
  const promises = FLOWER_DATA.layers.map(layer => {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error('img load failed: ' + layer.name));
      img.src = layer.src;
    });
  });
  images = await Promise.all(promises);
  // Compute bounding boxes
  const tmp = document.createElement('canvas');
  const tctx = tmp.getContext('2d', { willReadFrequently: true });
  for (let i = 0; i < images.length; i++) {
    const img = images[i];
    const layer = FLOWER_DATA.layers[i];
    tmp.width = img.width;
    tmp.height = img.height;
    tctx.clearRect(0, 0, img.width, img.height);
    tctx.drawImage(img, 0, 0);
    const data = tctx.getImageData(0, 0, img.width, img.height).data;
    let minX = img.width, minY = img.height, maxX = -1, maxY = -1;
    // Sample every 2 px for speed — plenty accurate for 400px images
    const STEP = 2;
    const THRESH = 16;
    for (let y = 0; y < img.height; y += STEP) {
      for (let x = 0; x < img.width; x += STEP) {
        const alpha = data[(y * img.width + x) * 4 + 3];
        if (alpha > THRESH) {
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }
    if (maxX < 0) { // fully transparent? fall back to full canvas
      minX = 0; minY = 0; maxX = img.width - 1; maxY = img.height - 1;
    }
    // Convert image pixel coords → normalized 0..1
    layer.bbox = {
      nMinX: minX / img.width,
      nMinY: minY / img.height,
      nMaxX: maxX / img.width,
      nMaxY: maxY / img.height,
    };
    // Visible center in NORMALIZED canvas coords (which equal normalized layer.w/h coords)
    layer.visibleCX = (layer.bbox.nMinX + layer.bbox.nMaxX) / 2;
    layer.visibleCY = (layer.bbox.nMinY + layer.bbox.nMaxY) / 2;
    layer.visibleW = (layer.bbox.nMaxX - layer.bbox.nMinX) * layer.w;
    layer.visibleH = (layer.bbox.nMaxY - layer.bbox.nMinY) * layer.h;
  }
  // Now apply the LAYOUT transform using the real visible bounds
  applyLayout();
}

// ─── LAYOUT TRANSFORM ──────────────────────────────────────────────────────
// The user arranged flowers in an editor with overflow:visible, meaning parts
// of their composition can extend past the 375×812 stage bounds. Here we
// compute the visible bbox of ALL layers combined (using alpha-trimmed data)
// and then uniformly scale+translate the entire composition so that:
//   1. It fits horizontally inside the stage with margin
//   2. It fits vertically inside the BOTTOM zone y≈[TEXT_BOTTOM, STAGE_H-PAD]
//      (to leave room for the text overlay at the top)
//   3. Relative positions between flowers are PRESERVED (uniform scale)
function applyLayout() {
  // Target zone: bouquet lives in the lower ~55% of stage, well inside edges,
  // leaving generous room at top for the dramatic finale text composition.
  const TARGET_Y0 = STAGE_H * 0.42;   // top of bouquet area (below text zone)
  const TARGET_Y1 = STAGE_H * 0.955;  // bottom with margin
  const TARGET_X0 = 18;               // left margin
  const TARGET_X1 = STAGE_W - 18;     // right margin
  const TARGET_W = TARGET_X1 - TARGET_X0;
  const TARGET_H = TARGET_Y1 - TARGET_Y0;

  // Compute visible bbox across ALL layers (using alpha-trimmed bounds)
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const L of FLOWER_DATA.layers) {
    const b = L.bbox;
    const dispW = L.w * L.scale;
    const dispH = L.h * L.scale;
    const vx0 = L.x + b.nMinX * dispW;
    const vy0 = L.y + b.nMinY * dispH;
    const vx1 = L.x + b.nMaxX * dispW;
    const vy1 = L.y + b.nMaxY * dispH;
    if (vx0 < minX) minX = vx0;
    if (vy0 < minY) minY = vy0;
    if (vx1 > maxX) maxX = vx1;
    if (vy1 > maxY) maxY = vy1;
  }
  const srcW = maxX - minX;
  const srcH = maxY - minY;
  const srcCX = (minX + maxX) / 2;
  const srcCY = (minY + maxY) / 2;

  // Scale so the composition fits in the target zone (both axes), pick min
  const scaleX = TARGET_W / srcW;
  const scaleY = TARGET_H / srcH;
  const S = Math.min(scaleX, scaleY) * 0.94;  // 6% extra margin for breathing room

  // Target center = center of target zone
  const tgtCX = (TARGET_X0 + TARGET_X1) / 2;
  const tgtCY = (TARGET_Y0 + TARGET_Y1) / 2;

  // Apply transform to every layer:
  //   newX = tgtCX + (origX - srcCX) * S
  //   newY = tgtCY + (origY - srcCY) * S
  // And layer scale gets multiplied by S so each layer shrinks proportionally.
  for (const L of FLOWER_DATA.layers) {
    const dispW = L.w * L.scale;
    const dispH = L.h * L.scale;
    const cx = L.x + dispW / 2;
    const cy = L.y + dispH / 2;
    const ncx = tgtCX + (cx - srcCX) * S;
    const ncy = tgtCY + (cy - srcCY) * S;
    L.scale *= S;
    L.x = ncx - (L.w * L.scale) / 2;
    L.y = ncy - (L.h * L.scale) / 2;
  }
}

// ═══ SECTION 6: HERO / FINAL STATE ═══
// Final state = from JSON (exactly user-positioned)
function getFinalState(layer) {
  return {
    x: layer.x,
    y: layer.y,
    scale: layer.scale,
    rotation: layer.rotation,
    flipX: layer.flipX,
  };
}

// Hero state = VISIBLE content centered big, no rotation (for dramatic reveal).
// Uses the bbox computed at load time so each flower's actual center (not the
// empty canvas center) lands at the hero focal point.
function getHeroState(layer) {
  const targetPx = Math.min(STAGE_W, STAGE_H) * 0.62;
  const visW = layer.visibleW || layer.w;
  const visH = layer.visibleH || layer.h;
  const fitScale = targetPx / Math.max(visW, visH);
  const heroScale = clamp(Math.max(layer.scale * 1.7, fitScale), layer.scale * 1.4, 0.65);
  const w = layer.w * heroScale;
  const h = layer.h * heroScale;
  const vcX = layer.visibleCX !== undefined ? layer.visibleCX : 0.5;
  const vcY = layer.visibleCY !== undefined ? layer.visibleCY : 0.5;
  const heroCenterX = STAGE_W / 2;
  const heroCenterY = STAGE_H * 0.62;
  // At rotation=0, x-mapping depends on flipX (because the image is flipped around canvas center)
  const x = layer.flipX
    ? heroCenterX - (1 - vcX) * w
    : heroCenterX - vcX * w;
  const y = heroCenterY - vcY * h;
  return { x, y, scale: heroScale, rotation: 0, flipX: layer.flipX };
}

// ═══ SECTION 7: DRAW LAYER ═══
// Per-layer glow amount (0..1). The ACTIVE hero flower of each scene gets a
// very subtle pulsing internal shimmer during its HOLD phase only — glowing
// through the hero→final transition added a per-frame drawImage cost that
// read as a stutter on mobile. In the finale only the actual flower layers
// (3-7) get a faint constant lift, so sacola + fillers (0,1,2) pay zero cost.
function computeLayerGlow(layerIdx, t) {
  const sInfo = resolveScene(t);
  const sc = sInfo.scene;
  const localT = sInfo.sceneTime;
  const isFinale = sInfo.index === SCENES.length - 1;
  if (isFinale) {
    if (layerIdx < 3) return 0;  // skip sacola + fillers
    const base = 0.05 + Math.sin(t * 0.0012 + layerIdx * 0.4) * 0.018;
    const settle = clamp((localT - 2200) / 1400, 0, 1) * 0.03;
    return base + settle;
  }
  // Hero glow window tightened: ends at 2050ms (hold end at 2150ms minus 100)
  // so the transition 2150-3100 stays glow-free and smooth.
  if (sc.primary === layerIdx && localT > 260 && localT < 2050) {
    const inRamp  = clamp((localT - 260) / 700, 0, 1);
    const outRamp = 1 - clamp((localT - 1850) / 200, 0, 1);
    const heroPulse = 0.10 + Math.sin(t * 0.0018) * 0.035;
    return heroPulse * inRamp * outRamp;
  }
  return 0;
}

// `glowAmt` (0..1) adds a subtle second pass in 'screen' blend mode, which
// brightens the already-lit areas of the photo — reads as an internal shimmer
// without haloing the silhouette.
function drawLayer(layerIdx, state, alpha, glowAmt) {
  const layer = FLOWER_DATA.layers[layerIdx];
  const img = images[layerIdx];
  if (!img || alpha <= 0.001) return;
  const w = layer.w * state.scale;
  const h = layer.h * state.scale;
  const cx = state.x + w/2;
  const cy = state.y + h/2;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx, cy);
  if (state.flipX) ctx.scale(-1, 1);
  ctx.rotate(state.rotation * Math.PI / 180);
  ctx.drawImage(img, -w/2, -h/2, w, h);
  if (glowAmt > 0.001) {
    // Subtle 'screen' highlight pass — lifts the already-bright pixels a touch
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = alpha * glowAmt;
    ctx.drawImage(img, -w/2, -h/2, w, h);
    ctx.globalCompositeOperation = 'source-over';
  }
  ctx.restore();
}

// ═══ SECTION 8: SCENE RESOLVER ═══
function resolveScene(t) {
  if (t >= TOTAL_DURATION) {
    const last = SCENES.length - 1;
    return { index: last, scene: SCENES[last], sceneTime: SCENES[last].duration, sceneStart: TOTAL_DURATION - SCENES[last].duration };
  }
  let elapsed = 0;
  for (let i = 0; i < SCENES.length; i++) {
    if (t < elapsed + SCENES[i].duration) {
      return { index: i, scene: SCENES[i], sceneTime: t - elapsed, sceneStart: elapsed };
    }
    elapsed += SCENES[i].duration;
  }
  return { index: 0, scene: SCENES[0], sceneTime: 0, sceneStart: 0 };
}

// Find scene index and sceneStart for a layer
function findLayerScene(layerIdx) {
  let sceneStart = 0;
  for (let i = 0; i < SCENES.length; i++) {
    const sc = SCENES[i];
    if (sc.primary === layerIdx || sc.others.indexOf(layerIdx) !== -1) {
      return { sceneIdx: i, sceneStart: sceneStart, isPrimary: sc.primary === layerIdx };
    }
    sceneStart += sc.duration;
  }
  return null;
}

// ═══ BOUQUET BREATHING ═══
// Calm up-down float applied to EVERY layer once it's in its settled state.
// All layers share the same phase so the whole composition floats as one unit.
// Two components:
//   1. BASE — gentle ±4.5px tremor, ~7s cycle, always on once settled.
//   2. FINALE BIG LIFT — once the bouquet has fully assembled in the finale
//      (localT > 2800ms), layer in a larger slow wave so the whole composition
//      rises and falls dreamily. PHASE-LOCKED: the sine argument is built from
//      (sceneTime - 2800) with a π offset so it begins at sin=0 moving UPWARD,
//      not wherever the unlocked absolute-time phase happened to land (which
//      was drifting DOWN first and reading as jank). Ramps in smoothly over
//      1.5s, and since every consumer (layers, aura, flourishes) reads from
//      this function each frame, the ENTIRE composition moves as one rigid unit.
function getBouquetFloat(t) {
  const base = Math.sin(t * 0.00090) * 4.5;
  const info = resolveScene(t);
  if (info.index === SCENES.length - 1 && info.sceneTime > 2800) {
    const ramp = clamp((info.sceneTime - 2800) / 1500, 0, 1);
    const local = info.sceneTime - 2800;
    const phase = local * 0.00048 + Math.PI;
    return base + Math.sin(phase) * 12 * ramp;
  }
  return base;
}

// ═══ SECTION 9: PER-LAYER STATE AT TIME t ═══
function computeLayerState(layerIdx, t) {
  const info = findLayerScene(layerIdx);
  if (!info) return null;
  const sc = SCENES[info.sceneIdx];
  const localT = t - info.sceneStart;
  if (localT < 0) return null;

  const layer = FLOWER_DATA.layers[layerIdx];
  const final = getFinalState(layer);
  const behavior = info.isPrimary ? sc.primaryBehavior : sc.othersBehavior;
  const floatDy = getBouquetFloat(t);

  // Past this layer's scene → locked at final, floating with the bouquet
  if (localT >= sc.duration) {
    const b = Math.sin(t * 0.0012 + layerIdx * 0.7) * 0.0025;
    return {
      state: {
        x: final.x,
        y: final.y + floatDy,
        scale: final.scale * (1 + b),
        rotation: final.rotation,
        flipX: final.flipX,
      },
      alpha: 1,
    };
  }

  // ─── HERO behavior: big center entry → hold → shrink to final ───
  if (behavior === 'hero') {
    const hero = getHeroState(layer);
    const T_ENTRY_A = 260;   // entry start
    const T_ENTRY_B = 1000;  // entry end (fully big)
    const T_HOLD_B  = 2150;  // hold end
    const T_TRANS_B = 3100;  // transition to final end

    if (localT < T_ENTRY_A) return null;

    if (localT < T_ENTRY_B) {
      // Entry: scale 0 → hero, from below slight, opacity 0 → 1 (soft fade in).
      // CRITICAL: both x,y are computed using the SAME visible-bbox mapping as
      // getHeroState so the p=1 landing point is EXACTLY hero.x / hero.y. Using
      // raw canvas centering here (x=STAGE_W/2 - w/2) would land vcY*h - h/2
      // above where the hold phase expects the flower — a 20–40px vertical jump
      // the user perceives as "freezes then drops". Pivoting the visible center
      // eliminates that discontinuity entirely.
      const p = (localT - T_ENTRY_A) / (T_ENTRY_B - T_ENTRY_A);
      const e = easeOutBack(p);
      const s = Math.max(0, hero.scale * e);
      const w = layer.w * s;
      const h = layer.h * s;
      const vcX = layer.visibleCX !== undefined ? layer.visibleCX : 0.5;
      const vcY = layer.visibleCY !== undefined ? layer.visibleCY : 0.5;
      const drop = (1 - easeOutQuart(p)) * 36;
      const cx = STAGE_W / 2;
      const cy = STAGE_H * 0.62 + drop;
      const x = hero.flipX ? cx - (1 - vcX) * w : cx - vcX * w;
      const y = cy - vcY * h;
      return {
        state: { x, y, scale: s, rotation: 0, flipX: hero.flipX },
        alpha: easeOutCubic(p),
      };
    }

    if (localT < T_HOLD_B) {
      // Hold: subtle sway ±1.2°, breathing scale ±0.4%
      const holdLocal = localT - T_ENTRY_B;
      const wobble = Math.sin(holdLocal * 0.0018) * 1.2;
      const breath = Math.sin(holdLocal * 0.0024) * 0.004;
      return {
        state: {
          x: hero.x,
          y: hero.y,
          scale: hero.scale * (1 + breath),
          rotation: wobble,
          flipX: hero.flipX,
        },
        alpha: 1,
      };
    }

    if (localT < T_TRANS_B) {
      // Transition hero → final (blend float in as we settle)
      const p = (localT - T_HOLD_B) / (T_TRANS_B - T_HOLD_B);
      const e = easeInOutCubic(p);
      return {
        state: {
          x: lerp(hero.x, final.x, e),
          y: lerp(hero.y, final.y + floatDy * e, e),
          scale: lerp(hero.scale, final.scale, e),
          rotation: lerp(0, final.rotation, e),
          flipX: hero.flipX,
        },
        alpha: 1,
      };
    }

    // Settled — breathing at final, floating with the bouquet
    const b = Math.sin((localT - T_TRANS_B) * 0.0015) * 0.003;
    return {
      state: {
        x: final.x,
        y: final.y + floatDy,
        scale: final.scale * (1 + b),
        rotation: final.rotation,
        flipX: final.flipX,
      },
      alpha: 1,
    };
  }

  // ─── FADE LATE: fade in at final position during mid-late scene ───
  if (behavior === 'fadeLate') {
    const T_IN_A = 2200;
    const T_IN_B = 3000;
    if (localT < T_IN_A) return null;
    const p = clamp((localT - T_IN_A) / (T_IN_B - T_IN_A), 0, 1);
    const e = easeOutCubic(p);
    return {
      state: {
        x: final.x,
        y: final.y + floatDy * e + (1 - e) * 18,  // slide up + float in
        scale: final.scale * (0.92 + 0.08 * e),
        rotation: final.rotation,
        flipX: final.flipX,
      },
      alpha: e,  // smooth cubic fade in
    };
  }

  // ─── FROM BELOW: slide up into place (SACOLA in finale) ───
  if (behavior === 'fromBelow') {
    const T_IN_A = 740;
    const T_IN_B = 1850;
    if (localT < T_IN_A) return null;
    const p = clamp((localT - T_IN_A) / (T_IN_B - T_IN_A), 0, 1);
    const e = easeOutQuart(p);
    return {
      state: {
        x: final.x,
        y: final.y + (1 - e) * 160 + floatDy * e,  // slide up + float in
        scale: final.scale,
        rotation: final.rotation,
        flipX: final.flipX,
      },
      alpha: easeOutCubic(e),  // smoother fade
    };
  }

  return null;
}

// Determine which layer is currently "hero" (drawn on top)
function getCurrentHeroLayer(t) {
  const info = resolveScene(t);
  const sc = info.scene;
  if (sc.primaryBehavior !== 'hero') return -1;
  // Hero drawing on top only during entry + hold phase
  if (info.sceneTime < 260 || info.sceneTime >= 2150) return -1;
  return sc.primary;
}

// ═══ SECTION 10: TEXT ═══
const textOverlay = document.getElementById('textOverlay');
let textTimers = [];
function clearTextTimers() {
  for (const id of textTimers) clearTimeout(id);
  textTimers = [];
}

function showText(sceneIdx) {
  const sc = SCENES[sceneIdx];
  const isFinale = sceneIdx === SCENES.length - 1;
  clearTextTimers();
  textOverlay.classList.toggle('finale', isFinale);
  textOverlay.classList.remove('out');
  textOverlay.style.opacity = '1';

  if (isFinale) {
    // Multi-line dramatic layout:
    //   ✦  ·  ✦
    //   você é
    //   o mais lindo
    //   PRESENTE        ← gold gradient hero word, Great Vibes, huge
    //   que a vida me deu
    //   ✦  ·  ✦
    textOverlay.innerHTML = [
      '<span class="fLine orn"><span class="word">&#10022;&nbsp;·&nbsp;&#10022;</span></span>',
      '<span class="fLine fIntro"><span class="word">voc&ecirc;</span> <span class="word">&eacute;</span></span>',
      '<span class="fLine fMid"><span class="word">o</span> <span class="word">mais</span> <span class="word">lindo</span></span>',
      '<span class="fLine fHero"><span class="word">presente</span></span>',
      '<span class="fLine fMid"><span class="word">que</span> <span class="word">a</span> <span class="word">vida</span> <span class="word">me</span> <span class="word">deu</span></span>',
      '<span class="fLine orn ornBot"><span class="word">&#10022;&nbsp;·&nbsp;&#10022;</span></span>',
    ].join('');

    // Reveal timing — drama pacing (delays ms relative to showText call)
    // The finale scene has delay=2200 built into its internal behaviors, but
    // we can start immediately since showText is called at scene transition.
    const baseDelay = 2200;    // wait for bouquet settle
    const timings = [];
    // Ornament top
    timings.push({ i: 0, t: 0 });
    // Intro "você é" — 2 words
    timings.push({ i: 1, t: 220 }, { i: 2, t: 300 });
    // Mid "o mais lindo" — 3 words
    timings.push({ i: 3, t: 520 }, { i: 4, t: 600 }, { i: 5, t: 680 });
    // HERO word "presente" — slower emphasis pause + longer fade
    timings.push({ i: 6, t: 1000 });
    // Mid "que a vida me deu" — 5 words
    timings.push({ i: 7, t: 1560 }, { i: 8, t: 1630 }, { i: 9, t: 1700 }, { i: 10, t: 1770 }, { i: 11, t: 1840 });
    // Ornament bottom
    timings.push({ i: 12, t: 2150 });

    const words = textOverlay.querySelectorAll('.word');
    for (const T of timings) {
      const w = words[T.i];
      if (!w) continue;
      textTimers.push(setTimeout(() => w.classList.add('in'), baseDelay + T.t));
    }
  } else {
    // Regular scene text — parse {em} and [flower] markers for emphasis styling
    const txt = gender === 'fem' ? sc.fem : sc.mas;
    const flowerCls = 'f-' + sc.id;  // f-rosa, f-jasmim, f-violeta, f-girassol, f-orquidea
    const lines = txt.split('\n');
    const htmlLines = lines.map(line => {
      return line.split(' ').map(word => {
        // {linda} → emphasized adjective
        let m = word.match(/^\{(.+?)\}([,.!?;:]*)$/);
        if (m) return `<span class="word em ${flowerCls}">${m[1]}</span>${m[2] ? '<span class="word punct">' + m[2] + '</span>' : ''}`;
        // [rosa] → hero flower name, colored by its scene
        m = word.match(/^\[(.+?)\]([,.!?;:]*)$/);
        if (m) return `<span class="word flower ${flowerCls}">${m[1]}${m[2] || ''}</span>`;
        return `<span class="word">${word}</span>`;
      }).join(' ');
    }).join('<br>');
    textOverlay.innerHTML = htmlLines;
    // Reveal stagger: normal words fast, emphasized word pauses slightly, flower lands last with a longer hold
    const wordEls = Array.from(textOverlay.querySelectorAll('.word'));
    let delay = 110;
    const baseStagger = 58;
    const emPause = 180;   // extra beat before an emphasized adjective
    const flowerPause = 420; // dramatic beat before the flower name hero
    wordEls.forEach((w) => {
      if (w.classList.contains('flower')) delay += flowerPause;
      else if (w.classList.contains('em')) delay += emPause;
      textTimers.push(setTimeout(() => w.classList.add('in'), delay));
      delay += baseStagger;
    });
  }
  textVisible = true;
}

function hideText() {
  textOverlay.classList.add('out');
  textVisible = false;
}

// ═══ SECTION 11: PARTICLES ═══
// Small, delicate sparkles that live BEHIND the flowers only. Kept subtle so
// the bouquet stays the focal point — no front-layer dust in the face.
const particles = [];
function spawnParticle(x, y, kind) {
  particles.push({
    x, y,
    vx: (Math.random() - 0.5) * 0.35,
    vy: -(0.25 + Math.random() * 0.55),
    life: 0,
    maxLife: 2600 + Math.random() * 2600,
    // Much smaller: 0.5 → ~1.6 px core radius
    size: 0.5 + Math.random() * 1.1,
    kind: kind || 'gold',
    twinkle: Math.random() * Math.PI * 2,
  });
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt * 0.06;
    p.y += p.vy * dt * 0.04;
    p.vy += 0.0002 * dt; // very slight gravity pullback
    p.life += dt;
    p.twinkle += dt * 0.008;
    if (p.life > p.maxLife) particles.splice(i, 1);
  }
}
function drawParticlesBg() {
  for (const p of particles) {
    const lr = p.life / p.maxLife;
    const rawAlpha = Math.sin(lr * Math.PI) * (0.55 + 0.45 * Math.sin(p.twinkle));
    if (rawAlpha <= 0.01) continue;
    // All sparkles sit in the background layer — softened alpha
    const alpha = clamp(rawAlpha * 0.7, 0, 1);
    ctx.globalAlpha = alpha;
    const color = p.kind === 'gold' ? '#ffd866' : (p.kind === 'pink' ? '#ff9ad0' : '#ffffff');
    ctx.fillStyle = color;
    ctx.shadowBlur = 9;
    ctx.shadowColor = color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (1 - lr * 0.3), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

// ═══ SECTION 11b: PETAL DRIFT (slow translucent petals always on) ═══
// Distinct from the sparkle particles — these are larger, softer, slower
// falling petals drifting left/right in warm romantic colors. Provides
// organic depth behind the hero flowers without being busy.
// PERF: petals are PRE-RENDERED once per color into offscreen sprites.
// Frame draw = single drawImage per petal (cheap) instead of gradient+bezier.
const petals = [];
const PETAL_PALETTE = [
  { r: 255, g: 130, b: 170 }, // rose pink
  { r: 255, g: 190, b: 210 }, // pale pink
  { r: 255, g: 220, b: 140 }, // warm cream
  { r: 220, g: 160, b: 255 }, // lavender
  { r: 255, g: 100, b: 180 }, // magenta accent
];
const PETAL_SPRITE_SIZE = 56;   // offscreen canvas size per sprite
const PETAL_BASE_SIZE = 14;     // reference petal "size" used when baking
const petalSprites = [];
function initPetalSprites() {
  for (const c of PETAL_PALETTE) {
    const off = document.createElement('canvas');
    off.width = PETAL_SPRITE_SIZE;
    off.height = PETAL_SPRITE_SIZE;
    const oc = off.getContext('2d');
    const cx = PETAL_SPRITE_SIZE / 2;
    const cy = PETAL_SPRITE_SIZE / 2;
    const s = PETAL_BASE_SIZE;
    // Soft outer glow (drawn first, wider radius)
    const glow = oc.createRadialGradient(cx, cy, 0, cx, cy, s * 1.9);
    glow.addColorStop(0, `rgba(${c.r},${c.g},${c.b},0.55)`);
    glow.addColorStop(0.5, `rgba(${c.r},${c.g},${c.b},0.22)`);
    glow.addColorStop(1, `rgba(${c.r},${c.g},${c.b},0)`);
    oc.fillStyle = glow;
    oc.fillRect(0, 0, PETAL_SPRITE_SIZE, PETAL_SPRITE_SIZE);
    // Petal body with warm radial gradient (lighter tip → saturated core)
    const body = oc.createRadialGradient(cx, cy - s * 0.2, 0, cx, cy, s * 1.2);
    body.addColorStop(0, `rgba(${Math.min(255, c.r + 25)},${Math.min(255, c.g + 25)},${Math.min(255, c.b + 25)},1)`);
    body.addColorStop(0.55, `rgba(${c.r},${c.g},${c.b},0.85)`);
    body.addColorStop(1, `rgba(${c.r},${c.g},${c.b},0)`);
    oc.fillStyle = body;
    oc.beginPath();
    oc.moveTo(cx, cy - s);
    oc.bezierCurveTo(cx + s * 0.78, cy - s * 0.35, cx + s * 0.58, cy + s * 0.85, cx, cy + s * 0.95);
    oc.bezierCurveTo(cx - s * 0.58, cy + s * 0.85, cx - s * 0.78, cy - s * 0.35, cx, cy - s);
    oc.fill();
    // Tiny highlight dot for sparkle
    oc.fillStyle = `rgba(255,255,255,0.55)`;
    oc.beginPath();
    oc.arc(cx - s * 0.15, cy - s * 0.35, s * 0.12, 0, Math.PI * 2);
    oc.fill();
    petalSprites.push(off);
  }
}
function spawnPetal(fromTop) {
  if (petals.length > MAX_PETALS) return;
  const idx = (Math.random() * PETAL_PALETTE.length) | 0;
  petals.push({
    spriteIdx: idx,
    x: -20 + Math.random() * (STAGE_W + 40),
    y: fromTop ? -30 - Math.random() * 60 : Math.random() * STAGE_H * 0.3,
    vy: 0.012 + Math.random() * 0.022, // slow (px per ms)
    vx: -0.008 + Math.random() * 0.016,
    rot: Math.random() * Math.PI * 2,
    vrot: (Math.random() - 0.5) * 0.0009,
    size: 5.5 + Math.random() * 8,
    alpha: 0.42 + Math.random() * 0.28,
    phase: Math.random() * Math.PI * 2,
    sway: 0.12 + Math.random() * 0.1,
    life: 0,
    maxLife: 14000 + Math.random() * 5000,
  });
}
function updatePetals(dt) {
  for (let i = petals.length - 1; i >= 0; i--) {
    const p = petals[i];
    p.life += dt;
    const swayDX = Math.sin(p.life * 0.0015 + p.phase) * p.sway;
    p.x += (p.vx + swayDX * 0.2) * dt;
    p.y += p.vy * dt;
    p.rot += p.vrot * dt;
    if (p.y > STAGE_H + 30 || p.life > p.maxLife) petals.splice(i, 1);
  }
}
function drawPetalsBg() {
  for (const p of petals) {
    const lr = p.life / p.maxLife;
    const fade = Math.sin(clamp(lr, 0, 1) * Math.PI);
    const a = p.alpha * fade * 0.85;
    if (a < 0.02) continue;
    const sprite = petalSprites[p.spriteIdx];
    if (!sprite) continue;
    // Scale sprite so the petal's in-world "size" matches PETAL_BASE_SIZE
    const scale = p.size / PETAL_BASE_SIZE;
    const drawSize = PETAL_SPRITE_SIZE * scale;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = a;
    ctx.drawImage(sprite, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ═══ SECTION 11c: FILM GRAIN (one-time generated pattern, animated offset) ═══
let grainCanvas = null;
let grainPattern = null;
let grainTick = 0;
function initGrain() {
  grainCanvas = document.createElement('canvas');
  grainCanvas.width = 160;
  grainCanvas.height = 160;
  const gctx = grainCanvas.getContext('2d');
  const id = gctx.createImageData(160, 160);
  for (let i = 0; i < id.data.length; i += 4) {
    // Gaussian-ish grain via double random
    const n = ((Math.random() + Math.random()) * 128) | 0;
    id.data[i] = n;
    id.data[i + 1] = n;
    id.data[i + 2] = n;
    id.data[i + 3] = 255;
  }
  gctx.putImageData(id, 0, 0);
  grainPattern = ctx.createPattern(grainCanvas, 'repeat');
}
function drawGrain(t) {
  if (!grainPattern) return;
  // PERF: skip most frames — the eye still perceives grain as alive when it
  // updates 15-20Hz. Mobile gets even heavier throttling for silky smoothness.
  grainTick = (grainTick + 1) % GRAIN_TICK_MOD;
  if (grainTick !== 0) return;
  ctx.save();
  // Moving offset creates true grain shimmer
  const ox = (t * 0.05) % 160 | 0;
  const oy = (t * 0.041) % 160 | 0;
  ctx.translate(ox, oy);
  ctx.globalAlpha = 0.065;
  ctx.globalCompositeOperation = 'overlay';
  ctx.fillStyle = grainPattern;
  ctx.fillRect(-ox - 4, -oy - 4, STAGE_W + 8, STAGE_H + 8);
  ctx.restore();
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

// ═══ SECTION 11d: CINEMATIC VIGNETTE (focus pull during heroes + finale) ═══
function drawCinematicVignette(t) {
  const info = resolveScene(t);
  const isFinale = info.index === SCENES.length - 1;
  const localT = info.sceneTime;
  // Base strength + emphasis spike during hero hold
  let strength = 0.26;
  if (isFinale) {
    if (localT > 2800) strength = 0.40;
    else if (localT > 900) strength = 0.26 + ((localT - 900) / 1900) * 0.14;
  } else if (localT > 1000 && localT < 2400) {
    const up = clamp((localT - 1000) / 260, 0, 1);
    const down = clamp((localT - 2150) / 250, 0, 1);
    const emph = easeOutCubic(up) * (1 - easeInCubic(down));
    strength = 0.26 + emph * 0.12;
  }
  const cx = STAGE_W / 2;
  const cy = STAGE_H * (isFinale ? 0.58 : 0.55);
  const r0 = STAGE_W * 0.30;
  const r1 = STAGE_W * 0.92;
  const g = ctx.createRadialGradient(cx, cy, r0, cx, cy, r1);
  g.addColorStop(0,   'rgba(10,5,18,0)');
  g.addColorStop(0.55, `rgba(8,3,14,${strength * 0.35})`);
  g.addColorStop(1,    `rgba(3,1,8,${strength})`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, STAGE_W, STAGE_H);
}

// ═══ SECTION 12: BACKGROUND (orbs + starfield) ═══
// PERF: the orbs barely move and the starfield is dense. Every frame we'd
// otherwise be regenerating ~9 radial gradients + 75 star arcs. Instead we
// render the full background to an OFFSCREEN canvas at a low cadence (once
// every ~4 frames ≈ 15Hz), and each main-loop frame just blits that image.
const orbs = [];
const stars = [];
let bgCanvas = null;
let bgCtx = null;
let bgLastRender = -9999;
const BG_RENDER_INTERVAL = 66; // ms — ~15Hz
function initBackground() {
  for (let i = 0; i < ORB_COUNT; i++) {
    orbs.push({
      x: Math.random() * STAGE_W,
      y: Math.random() * STAGE_H,
      r: 80 + Math.random() * 150,
      hue: 270 + Math.random() * 60,
      sat: 70 + Math.random() * 15,
      lit: 24 + Math.random() * 12,
      vx: (Math.random() - 0.5) * 0.22,
      vy: (Math.random() - 0.5) * 0.22,
      phase: Math.random() * Math.PI * 2,
    });
  }
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * STAGE_W,
      y: Math.random() * STAGE_H,
      r: 0.4 + Math.random() * 1.6,
      phase: Math.random() * Math.PI * 2,
      speed: 0.5 + Math.random() * 1.6,
    });
  }
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = STAGE_W;
  bgCanvas.height = STAGE_H;
  bgCtx = bgCanvas.getContext('2d');
}
function updateBackground(dt) {
  for (const o of orbs) {
    o.x += o.vx * dt * 0.05;
    o.y += o.vy * dt * 0.05;
    o.phase += dt * 0.0003;
    if (o.x < -o.r) o.vx = Math.abs(o.vx);
    if (o.x > STAGE_W + o.r) o.vx = -Math.abs(o.vx);
    if (o.y < -o.r) o.vy = Math.abs(o.vy);
    if (o.y > STAGE_H + o.r) o.vy = -Math.abs(o.vy);
  }
  for (const s of stars) {
    s.phase += dt * 0.001 * s.speed;
  }
}
// Render the static-ish background to the offscreen canvas
function renderBgOffscreen() {
  const c = bgCtx;
  c.fillStyle = '#0a0510';
  c.fillRect(0, 0, STAGE_W, STAGE_H);
  for (const o of orbs) {
    const breathe = 1 + Math.sin(o.phase) * 0.05;
    const r = o.r * breathe;
    const g = c.createRadialGradient(o.x, o.y, 0, o.x, o.y, r);
    g.addColorStop(0, `hsla(${o.hue},${o.sat}%,${o.lit}%,.55)`);
    g.addColorStop(0.55, `hsla(${o.hue},${o.sat}%,${o.lit*.7}%,.22)`);
    g.addColorStop(1, `hsla(${o.hue},${o.sat}%,${o.lit*.5}%,0)`);
    c.fillStyle = g;
    c.beginPath();
    c.arc(o.x, o.y, r, 0, Math.PI * 2);
    c.fill();
  }
  for (const s of stars) {
    const a = 0.3 + 0.7 * (Math.sin(s.phase) * 0.5 + 0.5);
    c.globalAlpha = a * 0.8;
    c.fillStyle = '#ffffff';
    c.beginPath();
    c.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    c.fill();
  }
  c.globalAlpha = 1;
  const vg = c.createRadialGradient(STAGE_W/2, STAGE_H*0.52, STAGE_H*0.25, STAGE_W/2, STAGE_H*0.52, STAGE_H*0.78);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.65)');
  c.fillStyle = vg;
  c.fillRect(0, 0, STAGE_W, STAGE_H);
}
function drawBackground(t) {
  if (!bgCanvas) return;
  if (t - bgLastRender >= BG_RENDER_INTERVAL) {
    renderBgOffscreen();
    bgLastRender = t;
  }
  ctx.drawImage(bgCanvas, 0, 0, STAGE_W, STAGE_H);
}

// ═══ SECTION 13: GLOW RING (behind hero during entry) ═══
function drawHeroGlowRing(t, heroIdx) {
  if (heroIdx < 0) return;
  const info = resolveScene(t);
  const localT = info.sceneTime;
  // Ring visible during entry + hold
  const T_START = 52;
  const T_PEAK = 1000;
  const T_END = 2150;
  if (localT < T_START || localT > T_END) return;
  let a;
  if (localT < T_PEAK) a = easeOutCubic((localT - T_START) / (T_PEAK - T_START));
  else a = 1 - easeInCubic((localT - T_PEAK) / (T_END - T_PEAK));
  a = clamp(a, 0, 1) * 0.42;
  const cx = STAGE_W / 2;
  const cy = STAGE_H * 0.62;
  const pulse = 1 + Math.sin(t * 0.002) * 0.04;
  const r = 150 * pulse;
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  g.addColorStop(0, `rgba(255, 200, 230, ${a * 0.35})`);
  g.addColorStop(0.4, `rgba(255, 140, 200, ${a * 0.22})`);
  g.addColorStop(0.7, `rgba(180, 90, 200, ${a * 0.1})`);
  g.addColorStop(1, 'rgba(120, 40, 160, 0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
}

// ═══ SECTION 14: LIGHT BURST (finale) ═══
function drawLightBurst(t) {
  const info = resolveScene(t);
  if (info.index !== SCENES.length - 1) return;
  const localT = info.sceneTime;
  const T_A = 210, T_B = 780;
  if (localT < T_A || localT > T_B) return;
  const p = (localT - T_A) / (T_B - T_A);
  const a = (1 - p) * 0.72;
  const cx = STAGE_W / 2;
  const cy = STAGE_H * 0.62;
  const r = 40 + p * 340;
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  g.addColorStop(0, `rgba(255, 240, 220, ${a})`);
  g.addColorStop(0.3, `rgba(255, 200, 230, ${a * 0.6})`);
  g.addColorStop(0.6, `rgba(200, 130, 220, ${a * 0.25})`);
  g.addColorStop(1, 'rgba(100, 40, 160, 0)');
  ctx.fillStyle = g;
  ctx.globalCompositeOperation = 'screen';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
}

// ═══ SECTION 14c: BOUQUET FLOURISHES (finale — on top of flowers) ═══
// Delicate 4-point gold sparkle glyphs floating around the upper bouquet area,
// matching the PRESENTE gradient palette. Each has its own slow-twinkle phase
// and gentle vertical drift. A handful of static anchor positions gives
// compositional rhythm rather than random chaos.
const flourishAnchors = [
  { x: 0.18, y: 0.38, s: 0.55, phase: 0.0 },
  { x: 0.32, y: 0.33, s: 0.70, phase: 1.1 },
  { x: 0.50, y: 0.30, s: 0.85, phase: 2.4 },
  { x: 0.70, y: 0.33, s: 0.65, phase: 3.6 },
  { x: 0.84, y: 0.39, s: 0.55, phase: 4.8 },
  { x: 0.12, y: 0.52, s: 0.55, phase: 0.7 },
  { x: 0.90, y: 0.54, s: 0.55, phase: 2.1 },
];
function drawSparkGlyph(cx, cy, size, alpha, hueMix) {
  // 4-point star with long horizontal/vertical lines + small diagonal cross.
  // hueMix 0→gold, 1→pink
  const gold = [255, 226, 140];
  const pink = [255, 170, 220];
  const r = Math.round(lerp(gold[0], pink[0], hueMix));
  const g = Math.round(lerp(gold[1], pink[1], hueMix));
  const b = Math.round(lerp(gold[2], pink[2], hueMix));
  const col = `rgba(${r},${g},${b},${alpha})`;
  const colSoft = `rgba(${r},${g},${b},${alpha * 0.25})`;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.globalCompositeOperation = 'screen';
  // Soft outer bloom
  ctx.fillStyle = colSoft;
  ctx.shadowColor = col;
  ctx.shadowBlur = 14 * size;
  ctx.beginPath();
  ctx.arc(0, 0, 1.8 * size, 0, Math.PI * 2);
  ctx.fill();
  // Crisp 4-point star (diamond) using two triangles
  ctx.shadowBlur = 6 * size;
  ctx.fillStyle = col;
  const L = 7 * size;  // long axis
  const S = 1.4 * size; // short axis
  ctx.beginPath();
  ctx.moveTo(0, -L);
  ctx.lineTo(S, 0);
  ctx.lineTo(0, L);
  ctx.lineTo(-S, 0);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-L, 0);
  ctx.lineTo(0, S);
  ctx.lineTo(L, 0);
  ctx.lineTo(0, -S);
  ctx.closePath();
  ctx.fill();
  // Tiny diagonal cross (subtle)
  ctx.shadowBlur = 2 * size;
  ctx.strokeStyle = col;
  ctx.lineWidth = 0.9 * size;
  const D = 2.8 * size;
  ctx.beginPath();
  ctx.moveTo(-D, -D); ctx.lineTo(D, D);
  ctx.moveTo(D, -D); ctx.lineTo(-D, D);
  ctx.stroke();
  ctx.restore();
  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur = 0;
}

function drawBouquetFlourishes(t) {
  const info = resolveScene(t);
  if (info.index !== SCENES.length - 1) return;
  const localT = info.sceneTime;
  let a;
  if (localT < 1600) return;
  else if (localT < 3200) a = easeOutCubic((localT - 1600) / 1600);
  else a = 1;
  const floatDy = getBouquetFloat(t);
  const anchors = flourishAnchors.length > FLOURISH_MAX ? flourishAnchors.slice(0, FLOURISH_MAX) : flourishAnchors;
  for (const f of anchors) {
    const tw = Math.sin(t * 0.0018 + f.phase);
    const alpha = clamp(a * (0.55 + 0.45 * tw), 0, 1);
    if (alpha < 0.04) continue;
    const drift = Math.sin(t * 0.0012 + f.phase * 1.7) * 3;
    const cx = f.x * STAGE_W;
    const cy = f.y * STAGE_H + floatDy * 0.9 + drift;
    const hueMix = (Math.sin(f.phase * 2 + t * 0.0008) + 1) * 0.5;
    drawSparkGlyph(cx, cy, f.s * (0.85 + 0.25 * tw), alpha, hueMix);
  }
}

// ═══ SECTION 15: MAIN LOOP ═══
function frame(now) {
  if (!started) { return; }  // don't bounce-loop when idle
  const dt = lastFrame ? Math.min(50, now - lastFrame) : 16;
  lastFrame = now;
  let t = now - startTime;
  if (t >= TOTAL_DURATION) {
    t = TOTAL_DURATION;
    if (!animationDone) {
      animationDone = true;
      document.getElementById('replayBtn').classList.add('shown');
    }
  }

  // Scene change detection
  const sInfo = resolveScene(t);
  if (sInfo.index !== currentSceneIdx) {
    currentSceneIdx = sInfo.index;
    showText(currentSceneIdx);
  }
  // Hide text before scene end (non-finale)
  if (textVisible && sInfo.index < SCENES.length - 1) {
    const timeToEnd = sInfo.scene.duration - sInfo.sceneTime;
    if (timeToEnd < 500) hideText();
  }

  updateBackground(dt);
  updateParticles(dt);
  updatePetals(dt);

  // Spawn a petal occasionally — continuous ambient drift throughout
  if (Math.random() < 0.014) spawnPetal(true);
  // Extra burst of petals during finale bloom
  if (sInfo.index === SCENES.length - 1 && sInfo.sceneTime > 1800 && sInfo.sceneTime < 5500) {
    if (Math.random() < 0.045) spawnPetal(true);
  }

  // Spawn sparse particles during finale (subtle — behind the flowers)
  if (sInfo.index === SCENES.length - 1 && sInfo.sceneTime > 1250) {
    const rate = Math.min(1, (sInfo.sceneTime - 1250) / 780);
    // At most 1 spawn per frame, ~30% chance at peak rate
    if (Math.random() < 0.32 * rate) {
      const idx = [1,2,3,5,6,7][Math.floor(Math.random()*6)];
      const L = FLOWER_DATA.layers[idx];
      const px = L.x + L.w * L.scale * (0.2 + Math.random() * 0.6);
      const py = L.y + L.h * L.scale * (0.2 + Math.random() * 0.5);
      const kind = Math.random() < 0.6 ? 'gold' : (Math.random() < 0.55 ? 'pink' : 'white');
      spawnParticle(px, py, kind);
    }
  }

  // Spawn subtle sparkles around hero flower during HOLD phase
  const heroIdxSpawn = getCurrentHeroLayer(t);
  if (heroIdxSpawn >= 0 && sInfo.sceneTime > 1000 && sInfo.sceneTime < 2150) {
    if (Math.random() < 0.28) {
      const cx = STAGE_W / 2;
      const cy = STAGE_H * 0.62;
      const ang = Math.random() * Math.PI * 2;
      const rad = 95 + Math.random() * 75;
      const px = cx + Math.cos(ang) * rad;
      const py = cy + Math.sin(ang) * rad * 0.9;
      const kind = Math.random() < 0.75 ? 'gold' : 'pink';
      spawnParticle(px, py, kind);
    }
  }

  // Ambient drift sparkles (very sparse — keep the scene clean)
  if (Math.random() < 0.04) {
    const px = Math.random() * STAGE_W;
    const py = STAGE_H * 0.2 + Math.random() * STAGE_H * 0.75;
    spawnParticle(px, py, 'white');
  }

  // DRAW
  ctx.clearRect(0, 0, STAGE_W, STAGE_H);
  drawBackground(t);

  const heroIdx = getCurrentHeroLayer(t);
  drawHeroGlowRing(t, heroIdx);

  // Soft petals drifting — behind flowers, ambient depth
  drawPetalsBg();
  // All sparkles live BEHIND the flowers
  drawParticlesBg();
  // Decorative flourishes also behind the flowers
  drawBouquetFlourishes(t);

  // Draw all layers in z-order, skipping current hero
  for (let i = 0; i < FLOWER_DATA.layers.length; i++) {
    if (i === heroIdx) continue;
    const res = computeLayerState(i, t);
    if (res) drawLayer(i, res.state, res.alpha, computeLayerGlow(i, t));
  }
  // Hero on top
  if (heroIdx >= 0) {
    const res = computeLayerState(heroIdx, t);
    if (res) drawLayer(heroIdx, res.state, res.alpha, computeLayerGlow(heroIdx, t));
  }

  drawLightBurst(t);

  // Cinematic final passes — focus vignette + filmic grain
  drawCinematicVignette(t);
  drawGrain(t);

  scheduleFrame(frame);
}

// ═══ SECTION 16: EVENT HANDLING ═══
function startAnim() {
  if (started) return;
  document.getElementById('startBtn').classList.add('hidden');
  started = true;
  startTime = performance.now();
  lastFrame = 0;
  currentSceneIdx = -1;
  animationDone = false;
  particles.length = 0;
  petals.length = 0;
  // Seed a handful of petals already on screen so it's not empty at t=0
  for (let i = 0; i < 6; i++) {
    spawnPetal(false);
  }
  document.getElementById('replayBtn').classList.remove('shown');
  textOverlay.innerHTML = '';
  textOverlay.classList.remove('out');
  scheduleFrame(frame);  // kick off the loop
}

function replay() {
  started = false;
  startTime = 0;
  currentSceneIdx = -1;
  animationDone = false;
  particles.length = 0;
  petals.length = 0;
  textOverlay.innerHTML = '';
  textOverlay.classList.remove('out', 'finale');
  document.getElementById('replayBtn').classList.remove('shown');
  document.getElementById('startBtn').classList.remove('hidden');
  // Redraw initial static state (background + any "prelude" visible)
  ctx.clearRect(0, 0, STAGE_W, STAGE_H);
  drawBackground(0);
}

document.getElementById('startBtn').addEventListener('click', startAnim);
document.getElementById('replayBtn').addEventListener('click', replay);
document.getElementById('genderBtn').addEventListener('click', () => {
  gender = gender === 'fem' ? 'mas' : 'fem';
  document.getElementById('genderBtn').textContent = gender === 'fem' ? '\u2640' : '\u2642';
  localStorage.setItem('poema-gender', gender);
  if (started && currentSceneIdx >= 0 && !animationDone) showText(currentSceneIdx);
});
document.getElementById('genderBtn').textContent = gender === 'fem' ? '\u2640' : '\u2642';

// Expose internals for debugging / forced frame rendering
window.__poema = {
  SCENES, TOTAL_DURATION, FLOWER_DATA, images,
  computeLayerState, drawBackground, drawLayer, drawHeroGlowRing, drawLightBurst,
  getCurrentHeroLayer, resolveScene, getHeroState, getFinalState,
  renderAtTime(t) {
    ctx.clearRect(0, 0, STAGE_W, STAGE_H);
    drawBackground(t);
    const heroIdx = getCurrentHeroLayer(t);
    drawHeroGlowRing(t, heroIdx);
    drawPetalsBg();
    drawParticlesBg();
    drawBouquetFlourishes(t);
    for (let i = 0; i < FLOWER_DATA.layers.length; i++) {
      if (i === heroIdx) continue;
      const res = computeLayerState(i, t);
      if (res) drawLayer(i, res.state, res.alpha, computeLayerGlow(i, t));
    }
    if (heroIdx >= 0) {
      const res = computeLayerState(heroIdx, t);
      if (res) drawLayer(heroIdx, res.state, res.alpha, computeLayerGlow(heroIdx, t));
    }
    drawLightBurst(t);
    drawCinematicVignette(t);
    drawGrain(t);
    return { t, heroIdx, scene: resolveScene(t) };
  },
  showTextAt(t) {
    const info = resolveScene(t);
    showText(info.index);
  }
};

window.addEventListener('resize', resizeCanvas);

// ═══ SECTION 17: INIT ═══
resizeCanvas();
initBackground();
initGrain();
initPetalSprites();

loadImages().then(() => {
  document.getElementById('loading').classList.add('hidden');
  setTimeout(() => { const el = document.getElementById('loading'); if (el) el.remove(); }, 800);
  // Draw initial background so canvas isn't blank
  ctx.clearRect(0, 0, STAGE_W, STAGE_H);
  drawBackground(0);
}).catch(err => {
  document.getElementById('loading').textContent = 'erro: ' + err.message;
  console.error(err);
});

})();
</script>
